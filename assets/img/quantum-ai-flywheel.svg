<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" role="img" aria-labelledby="title desc" font-family="Geist, Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <title id="title">The quantum–AI flywheel is spinning up</title>
  <desc id="desc">A timeline of breakthroughs from 2020 to 2033 showing an accelerating pace of AI and quantum milestones, with fault-tolerant quantum computing projected for 2029 and 100,000-qubit machines by 2033.</desc>
  <style>
    :root { color-scheme: light dark; }
    .bg    { fill: #f7f4ec; }
    .ink   { fill: #2b2622; }
    .muted { fill: #6f675c; }
    .line  { stroke: #e3ddce; }
    .grid  { stroke: #e3ddce; }
    .axis  { stroke: #c8c0ae; }
    .curve { stroke: #a64a28; }
    .proj  { stroke: #a64a28; }
    .dotAI { fill: #a64a28; stroke: #f7f4ec; }
    .dotQ  { fill: #2b2622; stroke: #f7f4ec; }
    .lblYr { fill: #a64a28; }
    @media (prefers-color-scheme: dark) {
      .bg    { fill: #1c1a17; }
      .ink   { fill: #ece4d6; }
      .muted { fill: #9c9384; }
      .line  { stroke: #33302a; }
      .grid  { stroke: #33302a; }
      .axis  { stroke: #4a463e; }
      .curve { stroke: #e2885f; }
      .proj  { stroke: #e2885f; }
      .dotAI { fill: #e2885f; stroke: #1c1a17; }
      .dotQ  { fill: #ece4d6; stroke: #1c1a17; }
      .lblYr { fill: #e2885f; }
    }
  </style>

  <rect class="bg" x="0" y="0" width="880" height="500" rx="10"/>

  <!-- Heading -->
  <text class="ink" x="40" y="46" font-size="22" font-weight="700" font-family="Fraunces, Georgia, serif">The flywheel is spinning up</text>
  <text class="muted" x="40" y="68" font-size="13.5">Pace of AI &amp; quantum breakthroughs — and the road to fault tolerance</text>

  <!-- Y axis label -->
  <text class="muted" x="40" y="430" font-size="12" transform="rotate(-90 40 430)" text-anchor="middle">capability / breakthrough cadence →</text>

  <!-- baseline axis -->
  <line class="axis" x1="90" y1="420" x2="840" y2="420" stroke-width="1.5"/>

  <!-- "today" marker between 2026 and 2029 -->
  <line class="grid" x1="461" y1="100" x2="461" y2="420" stroke-width="1" stroke-dasharray="3 5"/>
  <text class="muted" x="461" y="440" font-size="11.5" text-anchor="middle">today (2026)</text>

  <!-- the curve: solid through 2026, dashed projection after -->
  <path class="curve" fill="none" stroke-width="3" stroke-linecap="round"
        d="M 90 360 C 170 348, 210 330, 258 318 S 330 300, 371 252 S 410 212, 427 198"/>
  <path class="proj" fill="none" stroke-width="3" stroke-linecap="round" stroke-dasharray="2 8"
        d="M 427 198 C 500 150, 560 130, 595 122 S 730 90, 840 78"/>

  <!-- milestone dots + labels -->
  <!-- 2020 AlphaFold -->
  <circle class="dotAI" cx="90" cy="360" r="6" stroke-width="2"/>
  <text class="lblYr" x="86" y="392" font-size="12.5" font-weight="700">2020</text>
  <text class="muted" x="86" y="407" font-size="11.5">AlphaFold 2</text>

  <!-- 2023 GNoME -->
  <circle class="dotAI" cx="258" cy="318" r="6" stroke-width="2"/>
  <text class="lblYr" x="258" y="300" font-size="12.5" font-weight="700" text-anchor="middle">2023</text>
  <text class="ink" x="258" y="285" font-size="11.5" text-anchor="middle">GNoME: 2.2M materials</text>

  <!-- 2024 AlphaQubit + Nobels -->
  <circle class="dotAI" cx="315" cy="286" r="6" stroke-width="2"/>
  <text class="lblYr" x="315" y="388" font-size="12.5" font-weight="700" text-anchor="middle">2024</text>
  <text class="muted" x="315" y="403" font-size="11.5" text-anchor="middle">AlphaQubit · 2 AI Nobels</text>

  <!-- 2025 Quantum Echoes -->
  <circle class="dotQ" cx="371" cy="252" r="6" stroke-width="2"/>
  <text class="lblYr" x="371" y="234" font-size="12.5" font-weight="700" text-anchor="middle">2025</text>
  <text class="ink" x="371" y="219" font-size="11.5" text-anchor="middle">Quantum Echoes: 13,000×</text>

  <!-- 2026 $2B Commerce bet -->
  <circle class="dotQ" cx="427" cy="198" r="6" stroke-width="2"/>
  <text class="lblYr" x="441" y="180" font-size="12.5" font-weight="700">2026</text>
  <text class="ink" x="441" y="165" font-size="11.5">US bets $2B + equity</text>

  <!-- 2029 IBM Starling fault tolerance (projected) -->
  <circle class="dotQ" cx="595" cy="122" r="6" stroke-width="2" opacity="0.9"/>
  <text class="lblYr" x="595" y="104" font-size="12.5" font-weight="700" text-anchor="middle">2029</text>
  <text class="muted" x="595" y="89" font-size="11.5" text-anchor="middle">IBM Starling: fault tolerance</text>

  <!-- 2033 100k qubits (projected) -->
  <circle class="dotQ" cx="840" cy="78" r="6" stroke-width="2" opacity="0.9"/>
  <text class="lblYr" x="840" y="60" font-size="12.5" font-weight="700" text-anchor="end">2033</text>
  <text class="muted" x="840" y="45" font-size="11.5" text-anchor="end">100,000-qubit machine</text>

  <!-- legend -->
  <g transform="translate(620,452)">
    <circle class="dotAI" cx="0" cy="-4" r="5" stroke-width="1.5"/>
    <text class="muted" x="12" y="0" font-size="11.5">AI milestone</text>
    <circle class="dotQ" cx="92" cy="-4" r="5" stroke-width="1.5"/>
    <text class="muted" x="104" y="0" font-size="11.5">Quantum milestone</text>
  </g>
  <g transform="translate(40,452)">
    <line class="curve" x1="0" y1="-4" x2="26" y2="-4" stroke-width="3" stroke-linecap="round"/>
    <text class="muted" x="32" y="0" font-size="11.5">happened</text>
    <line class="proj" x1="120" y1="-4" x2="146" y2="-4" stroke-width="3" stroke-linecap="round" stroke-dasharray="2 7"/>
    <text class="muted" x="152" y="0" font-size="11.5">roadmap / projected</text>
  </g>
</svg>
