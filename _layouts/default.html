<!DOCTYPE html>
<html lang="en">
{%- include head.html -%}
<body>
  <a class="skip" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="bar">
      <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">writing</a>
        <a href="{{ '/about/' | relative_url }}">about</a>
        <a href="{{ '/resume/' | relative_url }}">resume</a>
        <a href="https://github.com/{{ site.github_username }}">github</a>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle light/dark">
          <span class="t-sun" aria-hidden="true">☀</span><span class="t-moon" aria-hidden="true">☾</span>
        </button>
      </nav>
    </div>
  </header>

  <main id="main" class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="bar">
      <span>© {{ site.time | date: "%Y" }} {{ site.author }}</span>
      <span class="dots">
        <a href="https://github.com/{{ site.github_username }}">GitHub</a>
        <a href="https://linkedin.com/in/{{ site.linkedin_username }}">LinkedIn</a>
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
      </span>
    </div>
  </footer>

  <script>
    (function () {
      var btn = document.getElementById('theme-toggle');
      if (!btn) return;
      function current() {
        return document.documentElement.getAttribute('data-theme')
          || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      }
      btn.addEventListener('click', function () {
        var next = current() === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        try { localStorage.setItem('theme', next); } catch (e) {}
      });
    })();
  </script>

  {%- comment -%} "Ask David" chatbot widget; hidden automatically if chatbot_endpoint is unset {%- endcomment -%}
  <div id="chatbot-root" data-endpoint="{{ site.chatbot_endpoint }}"></div>
  <script src="{{ '/assets/js/chatbot.js' | relative_url }}" defer></script>
</body>
</html>
