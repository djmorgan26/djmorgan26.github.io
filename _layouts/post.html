---
layout: default
---
<div class="read-progress" aria-hidden="true"><span></span></div>

<article class="post">
  <header class="post-header">
    <span class="post-date">{{ page.date | date: "%B %-d, %Y" }}</span>
    <h1 class="post-headline">{{ page.title }}</h1>
  </header>

  <div class="post-body">
    {{ content }}
  </div>

  <nav class="post-foot-nav">
    <a href="{{ '/' | relative_url }}">← All writing</a>
  </nav>
</article>
