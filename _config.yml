title: David Morgan
description: >-
  Notes on AI, engineering, and the bottlenecks that have moved.
author: David Morgan
email: davidjmorgan26@gmail.com

baseurl: ""
url: "https://djmorgan26.github.io"

github_username: djmorgan26
linkedin_username: davidjmorgan26

# Social-share preview (jekyll-seo-tag picks these up):
image:
  path: /assets/img/og.png
  width: 1200
  height: 630
  alt: "David Morgan, Data/AI Engineer at AT&T Chief Data Office"
twitter:
  card: summary_large_image
social:
  name: David Morgan
  links:
    - https://github.com/djmorgan26
    - https://linkedin.com/in/davidjmorgan26

# "Ask David" chatbot — Cloudflare Worker endpoint.
# Leave blank to hide the widget. Set to the deployed Worker's /chat URL.
chatbot_endpoint: "https://ask-david.djmorgan26.workers.dev/chat"

# Cloudflare Web Analytics (privacy-friendly, no cookies, no consent banner).
# Get a token at https://dash.cloudflare.com/?to=/:account/web-analytics
# Leave blank to disable. Token is safe to commit (public beacon, not a secret).
cloudflare_analytics_token: "488a7dce24be409a825d2eab4bd0f1f7"

plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Build settings
markdown: kramdown
permalink: /:year/:month/:day/:title.html

# Defaults
defaults:
  - scope:
      path: ""
    values:
      image: /assets/img/og.png
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# What Jekyll should not build
exclude:
  - CLAUDE.md
  - SETUP.md
  - source/
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
  - .bundle/
  - _design-preview.html
  - resume-pdf-source.html
