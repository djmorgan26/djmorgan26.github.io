---
layout: default
---
<article class="resume">
  <header class="resume-head">
    <div class="resume-head-row">
      <h1 class="resume-name">David Morgan</h1>
      {%- if page.pdf %}
      <a class="resume-download" href="{{ page.pdf | relative_url }}" download>Download PDF</a>
      {%- endif %}
    </div>
    <p class="resume-contact">
      <span class="resume-location">Atlanta, GA</span>
      <span class="resume-socials social-icons">
        <a href="mailto:davidjmorgan26@gmail.com" aria-label="Email davidjmorgan26@gmail.com" title="davidjmorgan26@gmail.com">{% include icon-mail.svg %}</a>
        <a href="https://linkedin.com/in/davidjmorgan26" aria-label="LinkedIn" title="LinkedIn">{% include icon-linkedin.svg %}</a>
        <a href="https://github.com/djmorgan26" aria-label="GitHub" title="GitHub">{% include icon-github.svg %}</a>
      </span>
    </p>
  </header>

  <div class="resume-body">
    {{ content }}
  </div>
</article>
